services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openartifacts
      POSTGRES_PASSWORD: openartifacts
      POSTGRES_DB: openartifacts
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openartifacts -d openartifacts"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://openartifacts:openartifacts@db:5432/openartifacts
      OA_VIEWER_URL: http://localhost:3000
      OA_S3_ENDPOINT: ${OA_S3_ENDPOINT}
      OA_S3_REGION: ${OA_S3_REGION:-us-east-1}
      OA_S3_BUCKET: ${OA_S3_BUCKET}
      OA_S3_ACCESS_KEY: ${OA_S3_ACCESS_KEY}
      OA_S3_SECRET_KEY: ${OA_S3_SECRET_KEY}

volumes:
  pg-data:
