name: publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (e.g. openartifacts-v0.2.0)
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.tag, 'openartifacts-v')) ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'openartifacts-v'))
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm
        run: npm install -g npm@latest

      - run: npm ci

      - name: Build CLI
        run: npm run build -w @openartifacts/shared && npm run build -w openartifacts

      - name: Publish to npm (trusted publishing)
        working-directory: packages/cli
        run: |
          chmod +x bin/openartifacts.js dist/index.js
          npm pack
          npm publish openartifacts-*.tgz --access public
        env:
          NPM_CONFIG_PROVENANCE: true
